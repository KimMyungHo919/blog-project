name: CI  # 워크플로우 이름

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine  # Redis 컨테이너 실행
        ports:
          - 6379:6379  # 포트 노출
        options: --health-cmd="redis-server --test-memory 100" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Redis 연결 대기
        run: |
          echo "Waiting for Redis to start..."
          until redis-cli -h 127.0.0.1 -p 6379 ping; do
            sleep 1
          done
          echo "Redis is ready"

      - name: Gradle 빌드 및 테스트
        run: ./gradlew build --no-daemon