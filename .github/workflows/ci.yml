name: CI  # 워크플로우 이름 (GitHub Actions 에서 표시됨)

on:
  push:
    branches:
      - main       # main 브랜치로 푸시될 때 실행
      - develop    # develop 브랜치로 푸시될 때 실행
  pull_request:
    branches:
      - main       # main 브랜치로 PR이 생성될 때 실행
      - develop    # develop 브랜치로 PR이 생성될 때 실행

jobs:
  build:  # 빌드 작업 정의
    runs-on: ubuntu-latest  # GitHub Actions 에서 제공하는 최신 Ubuntu 환경에서 실행

    services:
      redis:  # Redis 서비스 설정
        image: redis:latest  # 최신 Redis 이미지를 사용
        ports:
          - 6379:6379  # Redis 의 기본 포트인 6379 포트를 매핑

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        # GitHub 저장소의 코드를 가져옵니다.

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'  # OpenJDK 기반의 Temurin 사용
          java-version: '17'       # Java 17 버전 설정
          cache: 'gradle'          # Gradle 종속성을 캐싱하여 빌드 속도 향상

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew
        # Linux 환경에서 Gradle Wrapper (gradlew)에 실행 권한 부여

      - name: Gradle 빌드 및 테스트
        run: ./gradlew build --no-daemon
        # Gradle 을 사용하여 프로젝트 빌드 및 테스트 실행
        # --no-daemon 옵션은 데몬 프로세스를 사용하지 않도록 설정하여 문제 발생 가능성을 줄임

      - name: 테스트 Redis 연결
        run: |
          redis-cli -h redis ping
        # Redis 에 연결하여 정상 동작 여부 확인